<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Editar Segurança - GSVG</title>
<style>
body{font-family:Arial;background:#f1f1f1;padding:40px}
.box{background:white;padding:30px;border-radius:10px;max-width:700px;margin:auto;box-shadow:0 0 10px rgba(0,0,0,.1)}
input,select{width:100%;padding:12px;margin-top:10px;border:1px solid #ccc;border-radius:5px}
button{margin-top:15px;padding:12px;width:100%;background:#0d1b2a;color:white;border:none;border-radius:5px}
a{display:block;margin-top:15px;text-align:center;color:#0d1b2a}
</style>

<script>
// máscara CPF
function mascaraCPF(campo){
    let v = campo.value.replace(/\D/g,'');
    v = v.replace(/(\d{3})(\d)/,'$1.$2');
    v = v.replace(/(\d{3})(\d)/,'$1.$2');
    v = v.replace(/(\d{3})(\d{1,2})$/,'$1-$2');
    campo.value = v;
}
</script>

</head>
<body>

<div class="box">
<h2>Editar Segurança</h2>

<form method="post">
{% csrf_token %}

<input type="text" name="cpf" maxlength="14" value="{{ seguranca.cpf }}" oninput="mascaraCPF(this)" required>
<input type="text" name="nome_completo" value="{{ seguranca.nome_completo }}" required>

<select name="empresa_id" required>
{% for empresa in empresas %}
<option value="{{ empresa.id }}" {% if empresa.id == seguranca.empresa.id %}selected{% endif %}>
{{ empresa.nome }} - {{ empresa.cnpj }}
</option>
{% endfor %}
</select>

<select name="situacao">
<option value="Ativo" {% if seguranca.situacao == "Ativo" %}selected{% endif %}>Ativo</option>
<option value="Inativo" {% if seguranca.situacao == "Inativo" %}selected{% endif %}>Inativo</option>
<option value="Suspenso" {% if seguranca.situacao == "Suspenso" %}selected{% endif %}>Suspenso</option>
</select>

<button type="submit">Salvar Alterações</button>
</form>

<a href="/pesquisar">Voltar para pesquisa</a>

</div>

</body>
</html>
