{% extends 'cadastro/base.html' %}

{% block content %}

<style>
.painel-dashboard{
    background:#eef2f5;
    min-height:calc(100vh - 155px);
}

.painel-topo{
    background:white;
    padding:20px;
    border-radius:10px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-top:25px;
}

.card{
    background:white;
    padding:25px;
    border-radius:12px;
}

.card p{
    font-size:28px;
    font-weight:bold;
}

@media(max-width:900px){
    .cards{
        grid-template-columns:1fr 1fr;
    }
}

@media(max-width:600px){
    .cards{
        grid-template-columns:1fr;
    }
}
</style>

<div class="painel-dashboard">

    <div class="painel-topo">
        <h1>Dashboard GSVG</h1>
        <p>Visão geral do sistema</p>
    </div>

    <div class="cards">
        <div class="card">
            <h3>Total Empresas</h3>
            <p>{{ total_empresas }}</p>
        </div>

        <div class="card">
            <h3>Empresas Ativas</h3>
            <p>{{ empresas_ativas }}</p>
        </div>

        <div class="card">
            <h3>Total Seguranças</h3>
            <p>{{ total_segurancas }}</p>
        </div>

        <div class="card">
            <h3>Seguranças Ativos</h3>
            <p>{{ segurancas_ativos }}</p>
        </div>
    </div>

</div>

{% endblock %}
