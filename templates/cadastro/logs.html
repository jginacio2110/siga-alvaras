<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Logs - GSVG</title>
<style>
body{font-family:Arial;background:#f1f1f1;padding:40px}
.box{background:white;padding:30px;border-radius:10px;max-width:1200px;margin:auto;box-shadow:0 0 10px rgba(0,0,0,.1)}
input,select,button{padding:10px;margin-top:10px;border:1px solid #ccc;border-radius:5px}
button{background:#0d1b2a;color:white;border:none;cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{padding:10px;border:1px solid #ccc;text-align:left}
.filtros{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
.acoes{margin-top:10px}
a{color:#0d1b2a;font-weight:bold}
</style>
</head>
<body>

<div class="box">
<h2>Logs do Sistema</h2>

<form method="get">
<div class="filtros">
<select name="usuario">
<option value="">Todos os usuários</option>
{% for u in usuarios %}
<option value="{{ u.id }}" {% if usuario_id == u.id|stringformat:"s" %}selected{% endif %}>
{{ u.username }}
</option>
{% endfor %}
</select>

<input type="text" name="acao" value="{{ acao }}" placeholder="Buscar por ação">

<input type="date" name="data_inicio" value="{{ data_inicio }}">
<input type="date" name="data_fim" value="{{ data_fim }}">
</div>

<div class="acoes">
<button type="submit">Filtrar</button>
<a href="/logs">Limpar filtros</a>
<a href="/exportar-logs/">Exportar CSV</a>
</div>
</form>

<table>
<tr>
<th>Usuário</th>
<th>Ação</th>
<th>Descrição</th>
<th>Data</th>
</tr>

{% for log in logs %}
<tr>
<td>{{ log.usuario.username }}</td>
<td>{{ log.acao }}</td>
<td>{{ log.descricao }}</td>
<td>{{ log.data|date:"d/m/Y H:i" }}</td>
</tr>
{% empty %}
<tr>
<td colspan="4">Nenhum log encontrado.</td>
</tr>
{% endfor %}
</table>

</div>

</body>
</html>
