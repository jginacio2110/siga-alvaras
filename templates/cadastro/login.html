{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login - GSVG</title>

<style>
body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0d1b2a, #57564c);
    display: flex;
    align-items: center;
    justify-content: center;
}

.login-box {
    width: 360px;
    background: rgba(255,255,255,0.82);
    border-radius: 12px;
    padding: 25px 22px 35px;
    box-sizing: border-box;
    border-top: 4px solid #f4c21b;
    box-shadow: 0 4px 18px rgba(0,0,0,.25);
}

.logo-area {
    text-align: center;
    margin-bottom: 25px;
}

.logo-area span {
    font-size: 36px;
    font-weight: bold;
    color: #0d1b2a;
    vertical-align: middle;
}

.form-group {
    margin-bottom: 18px;
}

.form-group label {
    display: block;
    color: #555;
    margin-bottom: 6px;
    font-size: 15px;
}

.input-box {
    display: flex;
    position: relative;
    border: 1px solid #5da2ff;
    border-radius: 12px;
    overflow: hidden;
    background: #eaf2ff;
}

.input-box input {
    flex: 1;
    border: none;
    padding: 12px;
    padding-right: 45px;
    font-size: 15px;
    background: #eaf2ff;
    outline: none;
}

.input-icon {
    width: 38px;
    background: #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #555;
}

.eye-btn {
    border: none;
    cursor: pointer;
    font-size: 17px;
    background: transparent;
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 32px;
    height: 32px;
}

.eye-btn:hover {
    background: #d5d5d5;
    border-radius: 50%;
}

.checkbox-area {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 8px 0 22px;
    color: #555;
    font-weight: bold;
}

.checkbox-area input {
    width: 22px;
    height: 22px;
}

.btn-login {
    width: 100%;
    border: none;
    background: #f4c21b;
    color: #000;
    padding: 13px;
    border-radius: 25px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

.btn-login:hover {
    background: #d9aa0f;
}

.links {
    text-align: center;
    margin-top: 30px;
}

.links a {
    display: block;
    text-decoration: none;
    font-size: 18px;
    margin: 18px 0;
}

.esqueci {
    color: #007bff;
}

.registrar {
    color: #0aa12a;
}

.erro {
    background: #ffd6d6;
    color: #8b0000;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 15px;
    text-align: center;
}
</style>
</head>

<body>

<div class="login-box">

    <div class="logo-area">
        <span>GSVG</span>
    </div>

    {% if erro %}
        <div class="erro">{{ erro }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Id Funcional</label>
            <div class="input-box">
                <input type="text" name="username" placeholder="Id Funcional" required>
                <div class="input-icon">👤</div>
            </div>
        </div>

        <div class="form-group">
            <label>Senha</label>
            <div class="input-box">
                <input type="password" name="password" id="senha" placeholder="Senha" required>
                <button type="button" class="eye-btn" onclick="mostrarSenha()">👁</button>
            </div>
        </div>

        <label class="checkbox-area">
            <input type="checkbox" name="lembrar">
            Lembrar-me
        </label>

        <button type="submit" class="btn-login">
            Entrar ➜
        </button>
    </form>

    <div class="links">
        <a href="/alterar-senha/" class="esqueci">Esqueci minha senha</a>
        <a href="/registrar/" class="registrar">Registrar um novo usuário</a>
    </div>

</div>

<script>
function mostrarSenha() {
    const campo = document.getElementById("senha");
    const botao = document.querySelector(".eye-btn");

    if (campo.type === "password") {
        campo.type = "text";
        botao.innerHTML = "🙈";
    } else {
        campo.type = "password";
        botao.innerHTML = "👁";
    }
}
</script>

</body>
</html>
