<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>GSVG</title>
<style>
body{
margin:0;
font-family:Arial;
background:#0d1b2a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.box{
background:white;
padding:40px;
border-radius:10px;
width:350px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}
h2{
text-align:center;
color:#0d1b2a;
}
input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}
button{
width:100%;
padding:12px;
background:#1b263b;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
button:hover{
background:#415a77;
}
</style>
</head>
<body>
<div class="box">
<h2>GSVG</h2>
<form method="post">
{% csrf_token %}
<input type="text" name="username" placeholder="Usuário">
<input type="password" name="password" placeholder="Senha">
<button type="submit">Entrar</button>
</form>
</div>
</body>
</html>
