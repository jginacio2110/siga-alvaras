{% extends 'cadastro/base.html' %}
{% block content %}

<style>

/* REMOVE DUPLICAÇÃO E FORÇA PADRÃO */
.ba-card select {
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;

    background-color: white;
    color: #0d1b2a;

    border: 1px solid #cfcbb8;
    border-radius: 10px;

    padding: 12px;
}

.ba-card select:focus {
    border-color: #c7aa38;
    box-shadow: 0 0 0 2px rgba(199,170,56,.2);
}

/* TENTA MELHORAR COR DO DROPDOWN */
.ba-card option:checked {
    background: #f5f1dc;
    color: #0d1b2a;
}

/* ===== LAYOUT ===== */

.ba-card{
    background:white;
    border-radius:12px;
    max-width:1050px;
    margin:auto;
    box-shadow:0 2px 8px rgba(0,0,0,.10);
    overflow:hidden;
}

.ba-topo{
    background:#57564c;
    color:white;
    padding:25px;
    border-bottom:5px solid #c7aa38;
}

.ba-topo span{
    font-size:11px;
    letter-spacing:3px;
    font-weight:bold;
    color:#e8dfb5;
}

.ba-corpo{
    padding:35px;
}

.secao{
    font-size:12px;
    font-weight:bold;
    color:#57564c;
    letter-spacing:3px;
    margin:25px 0 15px;
    border-bottom:1px solid #d6d2bf;
    padding-bottom:10px;
}

label{
    font-size:11px;
    font-weight:bold;
    color:#6b6758;
}

.grid-2{display:grid;grid-template-columns:2fr 1fr;gap:25px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:25px;}
.grid-2-igual{display:grid;grid-template-columns:1fr 1fr;gap:25px;}

input, textarea{
    width:100%;
    padding:14px;
    border:1px solid #cfcbb8;
    border-radius:10px;
    background:white;
}

input:focus,
textarea:focus{
    border-color:#c7aa38;
    box-shadow:0 0 0 2px rgba(199,170,56,.2);
}

textarea{min-height:150px;}

.autocomplete-box{position:relative;}

.resultados-vigilante{
    position:absolute;
    top:76px;
    left:0;
    right:0;
    background:white;
    border:1px solid #cfcbb8;
    border-radius:10px;
    box-shadow:0 6px 15px rgba(0,0,0,.15);
    display:none;
}

.item-vigilante:hover{
    background:#f5f1dc;
}

/* 🔥 BOTÃO CORRIGIDO DEFINITIVO */
.ba-card .btn-salvar {
    background: #0d1b2a !important;
    color: white !important;
    border-radius: 10px;
    padding: 16px;
    font-weight: bold;
    cursor: pointer;
}

.ba-card .btn-salvar:hover {
    background: #c7aa38 !important;
    color: #0d1b2a !important;
}

.ba-card .btn-cancelar {
    background: #e8e6dc;
    color: #57564c;
    border-radius: 10px;
    padding: 16px;
    text-align:center;
}

.aviso{
    margin-top:20px;
    background:#f5f1dc;
    color:#57564c;
    border:1px solid #d6c275;
    padding:14px;
    border-radius:10px;
    font-size:11px;
    text-align:center;
}

.botoes{
    margin-top:30px;
    display:grid;
    grid-template-columns:1fr 160px;
    gap:15px;
}

</style>

<div class="ba-card">

    <div class="ba-topo">
        <h2>Boletim de Atendimento (BA)</h2>
        <span>DOCUMENTO OFICIAL DE INCIDENTE</span>
    </div>

    <div class="ba-corpo">
        <form method="post">
            {% csrf_token %}

            <div class="secao">ℹ INFORMAÇÕES GERAIS</div>

            <div class="grid-2">
                <div>
                    <label>TÍTULO DA OCORRÊNCIA *</label>
                    <input type="text" name="titulo" required>
                </div>

                <div>
                    <label>NATUREZA DA OCORRÊNCIA *</label>
                    <select name="natureza">
                        <option value="">Selecione...</option>
                    </select>
                </div>
            </div>

            <br>

            <div class="grid-3">
                <input type="date" name="data_fato" required>
                <input type="time" name="hora">
                <select name="municipio" required>
                    <option value="">Selecione...</option>
                    {% for m in municipios %}
                        <option value="{{ m.id }}">{{ m.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="secao">👥 PARTES ENVOLVIDAS</div>

            <div class="grid-2-igual">
                <select name="empresa">
                    <option value="">Não Aplicável / Outros</option>
                    {% for e in empresas %}
                        <option value="{{ e.id }}">{{ e.razao_social }}</option>
                    {% endfor %}
                </select>

                <div class="autocomplete-box">
                    <input type="text" id="vigilanteBusca" placeholder="Pesquisar vigilante...">
                    <input type="hidden" name="vigilante_id" id="vigilanteId">
                    <div id="resultadosVigilante" class="resultados-vigilante"></div>
                </div>
            </div>

            <div class="secao">☰ HISTÓRICO</div>

            <textarea name="historico" required></textarea>

            <div class="aviso">
                ESTE RELATO SERÁ ANEXADO AO PRONTUÁRIO
            </div>

            <div class="botoes">
                <button class="btn-salvar">FINALIZAR REGISTRO BA</button>
                <a href="/fiscalizacao/" class="btn-cancelar">CANCELAR</a>
            </div>
        </form>
    </div>
</div>
