{% extends 'cadastro/base.html' %}
{% block content %}

<style>
.pagina{display:flex;justify-content:center;align-items:center;height:calc(100vh - 55px);background:#f1f1f1}
.box{background:white;padding:40px;border-radius:10px;text-align:center;max-width:500px;box-shadow:0 0 10px rgba(0,0,0,.1)}
button{padding:12px 20px;background:#8b0000;color:white;border:none;border-radius:5px}
a{display:block;margin-top:20px;color:#0d1b2a;text-decoration:none}
</style>

<div class="pagina">
<div class="box">

<h2>Confirmar exclusão</h2>
<p>Deseja excluir {{ tipo }}: <strong>{{ nome }}</strong>?</p>

<form method="post">
{% csrf_token %}
<button type="submit">Sim, excluir</button>
</form>

<a href="/pesquisar/">Cancelar</a>

</div>
</div>

{% endblock %}
