<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Editar Empresa - GSVG</title>
<style>
body{font-family:Arial;background:#f1f1f1;padding:40px}
.box{background:white;padding:30px;border-radius:10px;max-width:700px;margin:auto;box-shadow:0 0 10px rgba(0,0,0,.1)}
input,select{width:100%;padding:12px;margin-top:10px;border:1px solid #ccc;border-radius:5px}
button{margin-top:15px;padding:12px;width:100%;background:#0d1b2a;color:white;border:none;border-radius:5px}
a{display:block;margin-top:15px;text-align:center;color:#0d1b2a}
</style>
</head>
<body>

<div class="box">
<h2>Editar Empresa</h2>

<form method="post">
{% csrf_token %}

<input type="text" name="cnpj" maxlength="18" value="{{ empresa.cnpj }}" placeholder="CNPJ" required>
<input type="text" name="nome" value="{{ empresa.nome }}" placeholder="Nome da Empresa" required>
<input type="text" name="endereco" value="{{ empresa.endereco }}" placeholder="Endereço" required>

<select name="situacao">
<option value="Ativa" {% if empresa.situacao == "Ativa" %}selected{% endif %}>Ativa</option>
<option value="Inativa" {% if empresa.situacao == "Inativa" %}selected{% endif %}>Inativa</option>
<option value="Suspensa" {% if empresa.situacao == "Suspensa" %}selected{% endif %}>Suspensa</option>
</select>

<button type="submit">Salvar Alterações</button>
</form>

<a href="/pesquisar">Voltar para pesquisa</a>
</div>

</body>
</html>
