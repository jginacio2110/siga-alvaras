<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastrar Alvará</title>
<style>
body{
font-family:Arial;
background:#f1f1f1;
padding:40px;
}
.box{
background:white;
padding:30px;
border-radius:10px;
max-width:700px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
input, select{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}
button{
margin-top:15px;
padding:12px;
width:100%;
background:#0d1b2a;
color:white;
border:none;
border-radius:5px;
}
</style>
</head>
<body>

<div class="box">
<h2>Cadastrar Alvará</h2>

<form method="post">
{% csrf_token %}

<input type="text" name="numero" placeholder="Número do Alvará">
<input type="text" name="nome" placeholder="Nome Empresa">
<input type="text" name="cnpj" placeholder="CNPJ">
<input type="text" name="endereco" placeholder="Endereço">
<input type="text" name="responsavel" placeholder="Responsável">
<input type="date" name="emissao">
<input type="date" name="validade">

<select name="situacao">
<option>Ativo</option>
<option>Vencido</option>
<option>Suspenso</option>
</select>

<button type="submit">Salvar</button>

</form>
</div>

</body>
</html>
