<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>GSVG</title>

<style>

input[type="time"] {
    background-color: white;
    color: #0d1b2a;
    border: 1px solid #cfcbb8;
    border-radius: 10px;
    padding: 12px;
}

input[type="time"]:focus {
    border-color: #c7aa38;
    box-shadow: 0 0 0 2px rgba(199,170,56,.2);
}

/* Ícone do relógio (remove azul padrão) */
input[type="time"]::-webkit-calendar-picker-indicator {
    filter: invert(25%) sepia(10%) saturate(500%) hue-rotate(20deg);
    cursor: pointer;
}

option {
    background: white;
    color: #0d1b2a;
}

option:checked,
option:hover {
    background: #f5f1dc;
    color: #0d1b2a;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #eef2f5;
}

/* TOPO BRANCO */
.top-header {
    height: 105px;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 35px;
    box-sizing: border-box;
}

.logo-area {
    display: flex;
    align-items: center;
    gap: 15px;
}

.logo-circle {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: #d6d2bf;
    border: 3px solid #6b6758;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: #4f4d43;
    font-size: 18px;
}

.logo-texto h1 {
    margin: 0;
    color: #5b5a50;
    font-size: 34px;
    font-weight: 800;
    letter-spacing: 1px;
}

.logo-texto span {
    color: #5b5a50;
    font-size: 16px;
    font-weight: bold;
}

/* USUÁRIO */
.usuario-menu {
    position: relative;
}

.usuario-btn {
    background: none;
    border: none;
    color: #333;
    font-size: 14px;
    cursor: pointer;
}

/* MENU */
.menu-bar {
    height: 50px;
    background: #57564c;
    border-bottom: 5px solid #c7aa38;
    display: flex;
    align-items: center;
    padding: 0 35px;
}

.menu {
    display: flex;
    align-items: center;
    height: 100%;
}

/* 🔥 CORRIGIDO - SEM “ZOOM” */
.menu a {
    color: white;
    text-decoration: none;
    padding: 0 22px;
    height: 50px;
    display: flex;
    align-items: center;
    font-weight: bold;
    font-size: 15px;
    box-sizing: border-box;
    transition: background-color 0.15s ease;
}

.menu a:hover {
    background-color: #47463e;
}

/* GARANTE QUE NUNCA VAI DAR SCALE */
.menu a,
.menu a:hover {
    transform: none !important;
}

.menu-item {
    position: relative;
    height: 100%;
    display: flex;
    align-items: center;
}

/* SUBMENU */
.submenu {
    display: none;
    position: absolute;
    top: 50px;
    left: 0;
    background: white;
    min-width: 230px;
    box-shadow: 0 4px 10px rgba(0,0,0,.25);
    z-index: 999;
}

/* 🔥 CORRIGIDO - SEM VARIAÇÃO DE TAMANHO */
.submenu a {
    display: flex;
    align-items: center;
    color: #222;
    padding: 0 20px;
    height: 42px;
    font-weight: normal;
    font-size: 16px;
    box-sizing: border-box;
}

.submenu a:hover {
    background: #f2f2f2;
}

.menu-item.ativo .submenu {
    display: block;
}

/* DROPDOWN USUÁRIO */
.dropdown {
    display: none;
    position: absolute;
    right: 0;
    top: 35px;
    background: white;
    min-width: 190px;
    box-shadow: 0 3px 10px rgba(0,0,0,.25);
    border-radius: 4px;
}

.dropdown a {
    display: block;
    padding: 12px;
    color: #333;
    text-decoration: none;
}

.dropdown a:hover {
    background: #f2f2f2;
}

.conteudo {
    padding: 30px;
}
</style>
</head>

<body>

<header class="top-header">
    <div class="logo-area">
        <div class="logo-circle">GSVG</div>

        <div class="logo-texto">
            <h1>GSVG</h1>
            <span>SISTEMA DE GESTÃO</span>
        </div>
    </div>

    <div class="usuario-menu">
        <button type="button" class="usuario-btn">
            👤 {{ request.user.username }} ▾
        </button>

        <div class="dropdown">
            <a href="/meus-dados/">Meus dados</a>
            <a href="/alterar-senha/">Alterar senha</a>
            <a href="/logout/">Sair</a>
        </div>
    </div>
</header>

<nav class="menu-bar">
    <div class="menu">
        <a href="/painel/">DASHBOARD</a>

        <a href="/cadastrar/">CADASTRAR</a>

        <div class="menu-item">
            <a href="#">PESQUISAR ▾</a>
            <div class="submenu">
                <a href="/pesquisar-empresa/">Pesquisar Empresas</a>
<a href="/pesquisar-seguranca/">Pesquisar Seguranças</a>
            </div>
        </div>

	<a href="/fiscalizacao/">FISCALIZAÇÃO</a>
        <a href="/usuarios/">USUÁRIOS</a>
        <a href="/logs/">LOGS</a>
        <a href="/admin/">ADMIN</a>
    </div>
</nav>

<main class="conteudo">
    {% block content %}
    {% endblock %}
</main>

<script>
document.addEventListener("DOMContentLoaded", function() {

    const usuarioBtn = document.querySelector('.usuario-btn');
    const usuarioDropdown = document.querySelector('.dropdown');
    const menuItems = document.querySelectorAll('.menu-item');

    function fecharSubmenus() {
        menuItems.forEach(item => item.classList.remove('ativo'));
    }

    function fecharUsuario() {
        if (usuarioDropdown) usuarioDropdown.style.display = 'none';
    }

    menuItems.forEach(item => {
        const link = item.querySelector('a');

        link.onclick = function(e) {
            e.preventDefault();
            e.stopPropagation();

            const aberto = item.classList.contains('ativo');

            fecharSubmenus();
            fecharUsuario();

            if (!aberto) item.classList.add('ativo');
        };

        const submenu = item.querySelector('.submenu');
        if (submenu) {
            submenu.onclick = e => e.stopPropagation();
        }
    });

    if (usuarioBtn && usuarioDropdown) {
        usuarioBtn.onclick = function(e) {
            e.stopPropagation();
            fecharSubmenus();

            usuarioDropdown.style.display =
                usuarioDropdown.style.display === 'block' ? 'none' : 'block';
        };

        usuarioDropdown.onclick = e => e.stopPropagation();
    }

    document.addEventListener('click', function() {
        fecharSubmenus();
        fecharUsuario();
    });
});
</script>

</body>
</html>
