<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>GSVG</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #eef2f5;
}

.topbar {
    background: #0d1b2a;
    color: white;
    height: 55px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 25px;
    box-sizing: border-box;
}

.logo {
    font-weight: bold;
    font-size: 18px;
}

.usuario-menu {
    position: relative;
}

.usuario-btn {
    background: none;
    border: none;
    color: white;
    font-size: 15px;
    cursor: pointer;
}

.dropdown {
    display: none;
    position: absolute;
    right: 0;
    top: 45px;
    background: white;
    min-width: 190px;
    box-shadow: 0 3px 10px rgba(0,0,0,.25);
    border-radius: 4px;
    z-index: 999;
}

.dropdown a {
    display: block;
    padding: 12px;
    color: #333;
    text-decoration: none;
}

.dropdown a:hover {
    background: #f2f2f2;
}
</style>

</head>
<body>

<div class="topbar">
    <div class="logo">GSVG</div>

    <div class="usuario-menu">
        <button type="button" class="usuario-btn">
            👤 {{ request.user.username }} ▾
        </button>

        <div class="dropdown">
            <a href="/meus-dados/">Meus dados</a>
            <a href="/alterar-senha/">Alterar senha</a>
            <a href="/logout/">Sair</a>
        </div>
    </div>
</div>

{% block content %}
{% endblock %}

<script>
document.addEventListener("DOMContentLoaded", function() {
    const btn = document.querySelector('.usuario-btn');
    const dropdown = document.querySelector('.dropdown');

    btn.onclick = function(e) {
        e.stopPropagation();
        dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
    };

    dropdown.onclick = function(e) {
        e.stopPropagation();
    };

    document.addEventListener('click', function() {
        dropdown.style.display = 'none';
    });
});
</script>

</body>
</html>
