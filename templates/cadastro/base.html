<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>GSVG</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #eef2f5;
}

.topbar {
    background: #d94b16;
    color: white;
    height: 55px;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 0 25px;
    box-sizing: border-box;
}

.usuario-menu {
    position: relative;
}

.usuario-btn {
    background: none;
    border: none;
    color: white;
    font-size: 15px;
    cursor: pointer;
    padding: 18px 10px;
}

.dropdown {
    display: none;
    position: absolute;
    right: 0;
    top: 55px;
    background: white;
    min-width: 190px;
    box-shadow: 0 3px 10px rgba(0,0,0,.25);
    border-radius: 4px;
    z-index: 999;
}

.dropdown a {
    display: block;
    padding: 12px 15px;
    color: #555;
    text-decoration: none;
    border-bottom: 1px solid #eee;
}

.dropdown a:hover {
    background: #f2f2f2;
}

.usuario-menu:hover .dropdown {
    display: block;
}
</style>

</head>
<body>

<div class="topbar">
    <div class="usuario-menu">
        <button class="usuario-btn">
            👤 {{ request.user.username }} ▾
        </button>

        <div class="dropdown">
            <a href="/meus-dados/">Meus dados</a>
            <a href="/alterar-senha/">Alterar senha</a>
            <a href="/logout/">Sair</a>
        </div>
    </div>
</div>

{% block content %}
{% endblock %}

</body>
</html>
